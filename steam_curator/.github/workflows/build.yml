name: Build Steam Curator

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write       # Needed to create GitHub Releases

jobs:

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller pillow customtkinter requests python-i18n \
            google-auth google-auth-oauthlib google-api-python-client \
            matplotlib python-jose[cryptography]

      - name: Build .app
        run: pyinstaller packaging/build.spec --clean --noconfirm

      - name: Create .dmg
        run: |
          hdiutil create \
            -volname "Steam Curator" \
            -srcfolder "dist/Steam Curator.app" \
            -ov -format UDZO \
            "dist/SteamCurator-macOS.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamCurator-macOS
          path: dist/SteamCurator-macOS.dmg

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller pillow customtkinter requests python-i18n `
            google-auth google-auth-oauthlib google-api-python-client `
            matplotlib python-jose[cryptography]

      - name: Build .exe
        run: pyinstaller packaging/build.spec --clean --noconfirm

      - name: Zip portable build
        run: |
          Compress-Archive -Path dist/SteamCurator/* `
            -DestinationPath dist/SteamCurator-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamCurator-Windows
          path: dist/SteamCurator-Windows.zip

  # ── Linux AppImage ─────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-tk tk-dev \
            libgtk-3-dev libglib2.0-dev \
            fuse libfuse2

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install pyinstaller pillow customtkinter requests python-i18n \
            google-auth google-auth-oauthlib google-api-python-client \
            matplotlib python-jose[cryptography]

      - name: Build binary
        run: pyinstaller packaging/build.spec --clean --noconfirm

      - name: Build AppImage
        run: |
          # Download appimagetool
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O appimagetool
          chmod +x appimagetool

          # Create AppDir
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps

          cp -r dist/SteamCurator/* AppDir/usr/bin/

          # Desktop entry
          cat > AppDir/SteamCurator.desktop << DESKTOP
          [Desktop Entry]
          Name=Steam Curator
          Exec=SteamCurator
          Icon=steamcurator
          Type=Application
          Categories=Game;Utility;
          DESKTOP

          # AppRun
          cat > AppDir/AppRun << APPRUN
          #!/bin/bash
          exec "\$APPDIR/usr/bin/SteamCurator" "\$@"
          APPRUN
          chmod +x AppDir/AppRun

          # Icon
          if [ -f assets/icon.png ]; then
            cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/steamcurator.png
            cp assets/icon.png AppDir/steamcurator.png
          fi

          # Build AppImage
          ARCH=x86_64 ./appimagetool AppDir dist/SteamCurator-Linux.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamCurator-Linux
          path: dist/SteamCurator-Linux.AppImage

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Steam Curator ${{ github.ref_name }}"
          body: |
            ## Steam Curator ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS    | `SteamCurator-macOS.dmg` |
            | Windows  | `SteamCurator-Windows.zip` |
            | Linux    | `SteamCurator-Linux.AppImage` |

            ### Installation
            **macOS:** Open the DMG and drag Steam Curator to Applications.
            **Windows:** Extract the ZIP and run `SteamCurator.exe`.
            **Linux:** `chmod +x SteamCurator-Linux.AppImage && ./SteamCurator-Linux.AppImage`

            ### What's new
            See [CHANGELOG.md](CHANGELOG.md) for full details.
          files: |
            artifacts/SteamCurator-macOS/SteamCurator-macOS.dmg
            artifacts/SteamCurator-Windows/SteamCurator-Windows.zip
            artifacts/SteamCurator-Linux/SteamCurator-Linux.AppImage
          draft: false
          prerelease: false
