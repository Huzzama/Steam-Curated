name: Build Steam Curator

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-macos:
    name: macOS (.app + .dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          python -c "import PySide6; print('PySide6 OK')"

      - name: Build .app
        run: pyinstaller packaging/build.spec --clean --noconfirm

      - name: Fix macOS permissions
        run: |
          chmod -R 755 "dist/Steam Curator.app"
          xattr -cr "dist/Steam Curator.app" || true

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Steam Curator" \
            -srcfolder "dist/Steam Curator.app" \
            -ov -format UDZO \
            "dist/SteamCurator-macOS.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/SteamCurator-macOS.dmg
          retention-days: 7

  build-windows:
    name: Windows (.exe zip)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -r requirements.txt
          python -c "import PySide6; print('PySide6 OK')"

      - name: Convert icon to .ico
        shell: pwsh
        run: python packaging/make_icon_ico.py

      - name: Build
        shell: pwsh
        run: python -m PyInstaller packaging/build.spec --clean --noconfirm

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path dist/SteamCurator -DestinationPath dist/SteamCurator-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/SteamCurator-Windows.zip
          retention-days: 7

  build-linux:
    name: Linux (AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libfuse2 fuse \
            libglib2.0-0 libgl1-mesa-glx \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon-x11-0 libdbus-1-3

      - name: Install Python deps
        run: |
          pip install --upgrade pip pyinstaller
          pip install -r requirements.txt
          python -c "import PySide6; print('PySide6 OK')"

      - name: Build binary
        run: |
          export QT_QPA_PLATFORM=offscreen
          pyinstaller packaging/build.spec --clean --noconfirm

      - name: Prepare icon
        run: python3 packaging/make_icon.py

      - name: Download appimagetool
        run: |
          wget -q \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r dist/SteamCurator/* AppDir/usr/bin/
          printf "[Desktop Entry]\nName=Steam Curator\nExec=SteamCurator\nIcon=steamcurator\nType=Application\nCategories=Game;Utility;\n" > AppDir/SteamCurator.desktop
          printf "#!/bin/bash\nexec \"\$APPDIR/usr/bin/SteamCurator\" \"\$@\"\n" > AppDir/AppRun
          chmod +x AppDir/AppRun
          if [ -f "assets/icon.png" ]; then
            cp assets/icon.png AppDir/steamcurator.png
            cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/steamcurator.png
          fi
          ARCH=x86_64 appimagetool AppDir dist/SteamCurator-Linux.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/SteamCurator-Linux.AppImage
          retention-days: 7

  release:
    name: Create Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Steam Curator ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Steam Curator ${{ steps.version.outputs.VERSION }}

            Personal Steam wishlist manager — PimpMySteam ecosystem.

            | Platform | File |
            |----------|------|
            | macOS | `SteamCurator-macOS.dmg` |
            | Windows | `SteamCurator-Windows.zip` |
            | Linux | `SteamCurator-Linux.AppImage` |

            **macOS:** Open DMG and drag to Applications.
            **Windows:** Extract ZIP and run `SteamCurator.exe`.
            **Linux:** `chmod +x SteamCurator-Linux.AppImage && ./SteamCurator-Linux.AppImage`

            ### Connect to PimpMySteam
            1. Create account at pimpmysteam.com
            2. Settings > Apps > Generate Token
            3. Paste in Steam Curator > Settings > PimpMySteam Account > Verify
          files: |
            artifacts/macos-dmg/SteamCurator-macOS.dmg
            artifacts/windows-zip/SteamCurator-Windows.zip
            artifacts/linux-appimage/SteamCurator-Linux.AppImage