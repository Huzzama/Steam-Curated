name: Build Steam Curator

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-macos:
    name: macOS (.app + .dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        run: |
          pip install --upgrade pip pyinstaller
          pip install -r requirements.txt
      - name: Build
        run: pyinstaller packaging/build.spec --clean --noconfirm
      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Steam Curator" \
            -srcfolder "dist/Steam Curator.app" \
            -ov -format UDZO \
            "dist/SteamCurator-macOS.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/SteamCurator-macOS.dmg
          retention-days: 7

  build-windows:
    name: Windows (.exe zip)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -r requirements.txt
      - name: Build
        shell: pwsh
        run: python -m PyInstaller packaging/build.spec --clean --noconfirm
      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path dist/SteamCurator -DestinationPath dist/SteamCurator-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/SteamCurator-Windows.zip
          retention-days: 7

  build-linux:
    name: Linux (AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk tk-dev libfuse2 fuse
      - name: Install Python deps
        run: |
          pip install --upgrade pip pyinstaller
          pip install -r requirements.txt
      - name: Build binary
        run: pyinstaller packaging/build.spec --clean --noconfirm
      - name: Prepare icon
        run: python3 packaging/make_icon.py
      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool
      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r dist/SteamCurator/* AppDir/usr/bin/

          cat > AppDir/SteamCurator.desktop << EOF2
          [Desktop Entry]
          Name=Steam Curator
          Exec=SteamCurator
          Icon=steamcurator
          Type=Application
          Categories=Game;Utility;
          EOF2

          printf '#!/bin/bash\nexec "$APPDIR/usr/bin/SteamCurator" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun

          if [ -f "assets/icon.png" ]; then
            cp assets/icon.png AppDir/steamcurator.png
            cp assets/icon.png "AppDir/usr/share/icons/hicolor/256x256/apps/steamcurator.png"
          fi

          ARCH=x86_64 appimagetool AppDir dist/SteamCurator-Linux.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/SteamCurator-Linux.AppImage
          retention-days: 7

  release:
    name: Create Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Steam Curator ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Steam Curator ${{ steps.version.outputs.VERSION }}

            Personal Steam wishlist manager with smart buy recommendations,
            bulk cover downloads, spending dashboard, and Google Drive sync.

            | Platform | File |
            |----------|------|
            | 🍎 macOS | `SteamCurator-macOS.dmg` |
            | 🪟 Windows | `SteamCurator-Windows.zip` |
            | 🐧 Linux | `SteamCurator-Linux.AppImage` |

            **macOS:** Open DMG → drag to Applications.
            **Windows:** Extract ZIP → run `SteamCurator.exe`.
            **Linux:** `chmod +x SteamCurator-Linux.AppImage && ./SteamCurator-Linux.AppImage`
          files: |
            artifacts/macos-dmg/SteamCurator-macOS.dmg
            artifacts/windows-zip/SteamCurator-Windows.zip
            artifacts/linux-appimage/SteamCurator-Linux.AppImage